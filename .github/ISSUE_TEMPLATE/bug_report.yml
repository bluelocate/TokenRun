name: 🐛 Bug Report
description: Report an error or unexpected behavior you encountered while using TokenRun.
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below as specifically as you can.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem in one or two sentences.
      placeholder: e.g. Tapping the login button does nothing.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List the exact steps to reproduce the problem.
      placeholder: |
        1. Launch the app
        2. Go to the Login screen
        3. Enter email/password and tap Login
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: The user should be logged in successfully.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: Nothing happens when the button is tapped; the screen freezes.
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: App Version
      placeholder: e.g. 1.2.3 (build 456)
    validations:
      required: false

  - type: input
    id: device
    attributes:
      label: Device / OS
      placeholder: e.g. iPhone 15 Pro, iOS 18.2
    validations:
      required: false

  - type: textarea
    id: attachments
    attributes:
      label: Screenshots / Logs
      description: Attach screenshots, screen recordings, or error messages. (Drag & drop supported)
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and confirmed this is not a duplicate.
          required: true
        - label: This report contains no personal information (email, phone, payment details, etc.).
          required: true
