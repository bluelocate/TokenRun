name: 💡 Feature Request
description: Suggest a new feature or improvement for TokenRun.
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing your idea. Please describe the problem you'd like to solve and the proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What pain point or limitation motivated this request?
      placeholder: e.g. I can't view my transaction history for periods longer than 30 days.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the feature or change you'd like to see.
      placeholder: Add a date range filter on the transaction history screen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds you've tried or alternative approaches you've thought about?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, mockups, or references that help illustrate the idea.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and confirmed this is not a duplicate.
          required: true
